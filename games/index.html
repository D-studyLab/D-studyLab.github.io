<!DOCTYPE html>
<html lang="ja">
<head>

<style>
  @font-face {
    font-family:"DotGothic16"; font-style:normal; font-weight:400;
    font-display:swap; src:url("/assets/fonts/DotGothic16-subset.woff2") format("woff2");
  }
  :root { --bg:#0c0f1a; --panel:#141a2b; --panel2:#1b2238; --line:#2c3654; --txt:#e7ecfb; --sub:#93a0c4;
          --acc:#4af; --acc-mg:#ff5db1; --acc-yl:#ffd23f; --gold:#ffd23f; }
  @media (prefers-color-scheme: light) {
    /* ゲームボーイ風 淡緑グレー */
    :root { --bg:#c7d0bd; --panel:#dbe2cf; --panel2:#e6ebda; --line:#8a9679; --txt:#20281a; --sub:#4c5a3d;
            --acc:#2b6d8f; --acc-mg:#a83b73; --acc-yl:#7a6410; --gold:#7a6410; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); line-height:1.7;
         font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; }
  .pix, header h1, .about h2, .chip, .card .nm, .today .lbl, .today .nm, .new, .empty {
    font-family:"DotGothic16","Hiragino Kaku Gothic ProN",monospace; letter-spacing:.01em; }
  /* CRT scanline overlay（静的テクスチャ扱い） */
  #scan { position:fixed; inset:0; z-index:9; pointer-events:none;
          background:repeating-linear-gradient(0deg, rgba(0,0,0,.05), rgba(0,0,0,.05) 1px, transparent 1px, transparent 3px);
          mix-blend-mode:multiply; }
  @media (prefers-color-scheme: light) { #scan { opacity:.5; } }
  /* 電源ON風フラッシュ（0.4秒・以後静止） */
  #boot { position:fixed; inset:0; z-index:20; pointer-events:none; background:var(--acc);
          animation:boot .42s ease-out forwards; }
  @keyframes boot { 0%{opacity:.0} 12%{opacity:.55} 100%{opacity:0; visibility:hidden;} }
  .wrap { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:26px 16px 60px; }
  .crumb { font-size:13px; color:var(--sub); margin-bottom:12px; }
  .crumb a { color:var(--acc); text-decoration:none; }
  header h1 { font-size:26px; margin:6px 0 4px; letter-spacing:.02em; }
  header .lead { color:var(--sub); font-size:14px; margin-bottom:20px; }
  /* 筐体マーキー風「きょうの1本」 */
  .today { background:var(--panel); border:2px solid var(--acc);
           box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--line);
           padding:14px 16px; margin:4px 0 24px; display:flex; align-items:center; gap:14px;
           text-decoration:none; color:inherit; position:relative; }
  .today:hover { transform:translateY(-3px); transition:transform .1s steps(2); }
  .today .emj { font-size:44px; line-height:1; }
  .today .lbl { font-size:12px; font-weight:bold; color:var(--acc-yl); letter-spacing:.16em;
                animation:blink 1s steps(1) 2; }
  @keyframes blink { 50%{opacity:.15} }
  .today .nm { font-size:19px; font-weight:bold; }
  .today .ds { font-size:13px; color:var(--sub); }
  .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .chip { border:2px solid var(--line); background:var(--panel); color:var(--sub);
          border-radius:0; padding:5px 14px; font-size:13px; cursor:pointer; user-select:none; }
  .chip:hover { border-color:var(--acc); color:var(--txt); }
  .chip.on { background:var(--acc); color:#04101d; border-color:var(--acc); font-weight:bold; }
  @media (prefers-color-scheme: light) { .chip.on { color:#e6ebda; } }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px; }
  /* ファミコンウィンドウ風 角ばった二重ボーダー */
  .card { background:var(--panel); border:2px solid var(--line); border-radius:0;
          box-shadow:inset 0 0 0 2px var(--panel), 0 3px 0 var(--line);
          padding:14px 13px 11px; display:flex; flex-direction:column; gap:7px; position:relative;
          transition:transform .08s steps(2), border-color .1s; }
  .card:hover { transform:translateY(-4px); border-color:var(--acc); }
  .card .play { text-decoration:none; color:inherit; display:flex; flex-direction:column; gap:7px; flex:1; }
  .card .emj { font-size:48px; line-height:1.1; }
  .card .nm { font-size:15px; font-weight:bold; }
  .card .ds { font-size:12.5px; color:var(--sub); flex:1; }
  .card .meta { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:3px; }
  .card .tag { font-size:11px; color:var(--sub); background:var(--panel2); border:1px solid var(--line);
               border-radius:0; padding:1px 7px; }
  .card .time { font-size:11px; color:var(--sub); margin-left:auto; }
  .card .guide { font-size:11.5px; color:var(--acc); text-decoration:none; margin-top:7px;
                 padding-top:7px; border-top:1px solid var(--line); display:inline-block; }
  .card .guide:hover { text-decoration:underline; }
  /* ドット調の旗 NEW */
  .new { position:absolute; top:-2px; right:-2px; background:var(--acc-mg); color:#fff;
         font-size:10px; font-weight:bold; padding:2px 8px 3px; border-radius:0; letter-spacing:.08em;
         box-shadow:-2px 2px 0 rgba(0,0,0,.3); }
  .about { margin:34px 0 0; border-top:2px solid var(--line); padding-top:20px; }
  .about h2 { font-size:16px; margin:0 0 8px; }
  .about p { color:var(--sub); font-size:13.5px; margin:4px 0; }
  .about a { color:var(--acc); }
  footer { margin-top:26px; color:var(--sub); font-size:12px; text-align:center; line-height:2; }
  footer a { color:var(--acc); }
  .empty { color:var(--sub); font-size:14px; padding:30px 0; text-align:center; grid-column:1/-1; }
  @media (prefers-reduced-motion: reduce) {
    #boot { display:none; }
    .today .lbl { animation:none; }
    .today:hover, .card:hover { transition:none; }
  }
</style>
</head>
<body>
<div id="boot" aria-hidden="true"></div>
<div id="scan" aria-hidden="true"></div>
<div class="wrap">
  <header>
    <div class="crumb"><a href="/">← D-studyLab トップ</a></div>
    <h1 class="pix">🕹 ミニゲームゲームズ</h1>
    <p class="lead">3日に1本のペースで増える、ブラウザで遊べるミニゲームの屋台。全部無料・インストール不要・スマホOK。</p>
  </header>

  <a class="today" id="today" href="#" target="_blank" rel="noopener"></a>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <!-- AD SLOT: 審査通過後にここへ -->

  <div class="about">
    <h2 class="pix">お店の口上</h2>
    <p>むずかしい概念ほど、読むより<b>遊べる</b>ほうが早くわかる。空間認識・確率・AIとの読み合いを、3分で触れるゲームにして並べています。</p>
    <p>1本ずつ、3日以内に必ず公開する。だから毎日ちょっとずつ増えます。</p>
    <p>読み物 → <a href="/blog/">📝 ブログ（地酒レビュー・開発環境の話）</a></p>
    <p>作ってる人 → <a href="https://x.com/info_prog_study" target="_blank" rel="noopener">X @info_prog_study</a></p>
  </div>

  <!-- AD SLOT: 審査通過後にここへ -->

  <footer>
    <a href="/about.html">運営者情報</a> ・ <a href="/privacy.html">プライバシーポリシー</a><br>
    すべて端末内で動作・送信なし ／ © D-studyLab
  </footer>
</div>

<script>
"use strict";
const GAMES = [
  { slug:'tsumi-battle',name:'積みバトル',               emoji:'🏗️', tags:['AI対戦','物理'],       desc:'先読みAIと崩さず積む・AIの脳内が見える',        time:'5分', added:'2026-07-21' },
  { slug:'kage-ate',    name:'かげ当てパズル',           emoji:'🌗', tags:['空間','パズル'],       desc:'光の向きから影の形を当てろ',                    time:'3分', added:'2026-07-21' },
  { slug:'kukan-test',  name:'空間認識偏差値テスト',     emoji:'🧠', tags:['空間','診断'],         desc:'頭の中で3Dを回せるか',                          time:'3分', added:'2026-07-20' },
  { slug:'answer-shoot',name:'アンサーシュート',         emoji:'🎯', tags:['クイズ','アクション'], desc:'答えがわかっても届けなきゃ正解じゃない',        time:'5分', added:'2026-07-21' },
  { slug:'yomiate',     name:'ヨミアテ',                 emoji:'🔢', tags:['推理','数字'],         desc:'情報を「買う」数字当て',                        time:'5分', added:'2026-07-21' },
  { slug:'untetris',    name:'つみおろし',               emoji:'🧩', tags:['推理','パズル'],       desc:'逆向きテトリス、積んだ順を暴け',                time:'4分', added:'2026-07-21' },
  { slug:'monty',       name:'モンティホール100連',      emoji:'🚪', tags:['確率','体感'],         desc:'「変える」となぜ2倍勝てるのか',                 time:'3分', added:'2026-07-21' },
  { slug:'toru-card',   name:'そのカード、取る？',       emoji:'🃏', tags:['確率','シミュ'],       desc:'デッキ構築の直感を1万回シミュで検算',          time:'4分', added:'2026-07-21' },
  { slug:'gacha-sim',   name:'1万人ガチャシミュレータ',  emoji:'🎰', tags:['確率','体感'],         desc:'「平均90連」の裏の地獄と天国',                  time:'3分', added:'2026-07-18' },
  { slug:'yomikiri',    name:'ヨミキリ',                 emoji:'✂️', tags:['AI対戦'],              desc:'あなたの癖を学習する限定ジャンケン',            time:'5分', added:'2026-07-19' },
  { slug:'damashi-ai',  name:'AIを騙せ！',               emoji:'🤖', tags:['AI対戦'],              desc:'騙すとその場で学習して強くなる',                time:'5分', added:'2026-07-19' },
];
const BASE = 'https://d-studylab.com/';

// ---- FNV-1a daily seed (既存ゲームと同一方式) ----
function dailySeed(dateStr) {
  let h = 2166136261;
  for (const ch of dateStr) { h ^= ch.charCodeAt(0); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function todayStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
// NEW = 追加日が新しい順の上位3本 かつ 7日以内（全部NEWになる初日問題と、
// 休業明けに古い作品へNEWが復活する問題の両方を防ぐ — サブ垢レビュー判断 2026-07-21）
const NEW_SLUGS = new Set(
  // ties must return 0 so the stable sort preserves GAMES order (newest-first by convention)
  GAMES.slice().sort((a, b) => a.added < b.added ? 1 : a.added > b.added ? -1 : 0)
    .slice(0, 3).map(g => g.slug));
function isNew(g) {
  const ms = Date.now() - new Date(g.added + 'T00:00:00').getTime();
  return NEW_SLUGS.has(g.slug) && ms >= 0 && ms < 7 * 86400000;
}

// ---- タグ集合（出現順を保つ） ----
const TAGS = [];
for (const g of GAMES) for (const t of g.tags) if (!TAGS.includes(t)) TAGS.push(t);

let activeTag = 'すべて';

function render() {
  const grid = document.getElementById('grid');
  const sorted = GAMES.slice().sort((a, b) => a.added < b.added ? 1 : a.added > b.added ? -1 : 0);
  const list = sorted.filter(g => activeTag === 'すべて' || g.tags.includes(activeTag));
  grid.innerHTML = list.length ? list.map(g => `
    <div class="card">
      ${isNew(g) ? '<span class="new">NEW</span>' : ''}
      <a class="play" href="${BASE}${g.slug}/" target="_blank" rel="noopener">
        <div class="emj">${g.emoji}</div>
        <div class="nm">${g.name}</div>
        <div class="ds">${g.desc}</div>
        <div class="meta">${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}<span class="time">${g.time}</span></div>
      </a>
      <a class="guide" href="guide/${g.slug}.html">📖 遊び方と見どころ</a>
    </div>`).join('') : '<div class="empty">このタグのゲームはまだありません</div>';
}

function renderFilters() {
  const el = document.getElementById('filters');
  const chips = ['すべて', ...TAGS];
  el.innerHTML = chips.map(t => `<span class="chip${t === activeTag ? ' on' : ''}" data-tag="${t}">${t}</span>`).join('');
  el.querySelectorAll('.chip').forEach(c => c.onclick = () => { activeTag = c.dataset.tag; renderFilters(); render(); });
}

function renderToday() {
  const pick = GAMES[dailySeed(todayStr()) % GAMES.length];
  const el = document.getElementById('today');
  el.href = `${BASE}${pick.slug}/`;
  el.innerHTML = `<div class="emj">${pick.emoji}</div>
    <div><div class="lbl">きょうの1本</div>
    <div class="nm">${pick.name}</div>
    <div class="ds">${pick.desc}・${pick.time}</div></div>`;
}

renderToday();
renderFilters();
render();
</script>
</body>
</html>
