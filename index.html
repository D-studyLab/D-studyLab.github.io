<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミニゲーム屋さん D-studyLab｜ブラウザで遊べる小さなゲームたち</title>
<meta name="description" content="3日以内に必ず公開。空間・確率・AI対戦のミニゲームを量産する個人ゲーム屋。無料・インストール不要・スマホOK">
<meta property="og:title" content="ミニゲーム屋さん D-studyLab">
<meta property="og:description" content="3日以内に必ず公開。空間・確率・AI対戦のミニゲームを量産する個人ゲーム屋。無料・インストール不要・スマホOK">
<meta property="og:type" content="website">
<meta property="og:url" content="https://d-studylab.github.io/">
<meta property="og:image" content="https://d-studylab.github.io/og.png">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root { --bg:#0f1116; --panel:#181b22; --line:#2a2f3a; --txt:#e7eaef; --sub:#98a1ad;
          --acc:#7cc4ff; --good:#6bdf9a; --bad:#ff8f8f; --gold:#e8c35a; }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f4f6f8; --panel:#fff; --line:#dde3ea; --txt:#1b2027; --sub:#5b6673;
            --acc:#1f6fb2; --good:#1f8a52; --bad:#c0492f; --gold:#a6791b; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); line-height:1.7;
         font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; }
  .wrap { max-width:920px; margin:0 auto; padding:26px 16px 60px; }
  header h1 { font-size:26px; margin:6px 0 4px; letter-spacing:.01em; }
  header .lead { color:var(--sub); font-size:14px; margin-bottom:20px; }
  .today { background:linear-gradient(135deg, color-mix(in srgb, var(--acc) 18%, var(--panel)), var(--panel));
           border:1px solid var(--acc); border-radius:14px; padding:14px 16px; margin:0 0 22px;
           display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit; }
  .today:hover { transform:translateY(-2px); transition:transform .12s; }
  .today .emj { font-size:44px; line-height:1; }
  .today .lbl { font-size:11px; font-weight:bold; color:var(--acc); letter-spacing:.14em; }
  .today .nm { font-size:19px; font-weight:bold; }
  .today .ds { font-size:13px; color:var(--sub); }
  .filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .chip { border:1px solid var(--line); background:var(--panel); color:var(--sub);
          border-radius:20px; padding:6px 15px; font-size:13px; cursor:pointer; user-select:none;
          font-family:inherit; }
  .chip:hover { border-color:var(--acc); color:var(--txt); }
  .chip.on { background:var(--acc); color:#0a0e14; border-color:var(--acc); font-weight:bold; }
  @media (prefers-color-scheme: light) { .chip.on { color:#fff; } }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:13px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px;
          padding:16px 15px 15px; text-decoration:none; color:inherit; display:flex; flex-direction:column;
          gap:7px; position:relative; transition:transform .12s, border-color .12s, box-shadow .12s; }
  .card:hover { transform:translateY(-4px); border-color:var(--acc);
                box-shadow:0 8px 24px rgba(0,0,0,.22); }
  .card .emj { font-size:48px; line-height:1.1; }
  .card .nm { font-size:15px; font-weight:bold; }
  .card .ds { font-size:12.5px; color:var(--sub); flex:1; }
  .card .meta { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:3px; }
  .card .tag { font-size:11px; color:var(--sub); background:color-mix(in srgb, var(--line) 60%, transparent);
               border-radius:5px; padding:1px 7px; }
  .card .time { font-size:11px; color:var(--sub); margin-left:auto; }
  .new { position:absolute; top:10px; right:10px; background:var(--gold); color:#1b1400;
         font-size:10px; font-weight:bold; padding:2px 7px; border-radius:20px; letter-spacing:.05em; }
  .about { margin:34px 0 0; border-top:1px solid var(--line); padding-top:20px; }
  .about h2 { font-size:16px; margin:0 0 8px; }
  .about p { color:var(--sub); font-size:13.5px; margin:4px 0; }
  .about a { color:var(--acc); }
  footer { margin-top:26px; color:var(--sub); font-size:12px; text-align:center; }
  .empty { color:var(--sub); font-size:14px; padding:30px 0; text-align:center; grid-column:1/-1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🕹️ ミニゲーム屋さん <span style="color:var(--acc)">D-studyLab</span></h1>
    <p class="lead">3日以内に必ず公開、を繰り返す小さなゲーム屋。全部ブラウザで動く・無料・インストール不要。</p>
  </header>

  <a class="today" id="today" href="#" target="_blank" rel="noopener"></a>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <!-- AD SLOT: 審査通過後にここへ -->

  <div class="about">
    <h2>お店の口上</h2>
    <p>むずかしい概念ほど、読むより<b>遊べる</b>ほうが早くわかる。空間認識・確率・AIとの読み合いを、3分で触れるゲームにして並べています。</p>
    <p>1本ずつ、3日以内に必ず公開する。だから毎日ちょっとずつ増えます。</p>
    <p>作ってる人 → <a href="https://x.com/info_prog_study" target="_blank" rel="noopener">X @info_prog_study</a></p>
  </div>

  <!-- AD SLOT: 審査通過後にここへ -->

  <footer>すべて端末内で動作・送信なし ／ D-studyLab</footer>
</div>

<script>
"use strict";
const GAMES = [
  { slug:'tsumi-battle',name:'積みバトル',               emoji:'🏗️', tags:['AI対戦','物理'],       desc:'先読みAIと崩さず積む・AIの脳内が見える',        time:'5分', added:'2026-07-21' },
  { slug:'kage-ate',    name:'かげ当てパズル',           emoji:'🌗', tags:['空間','パズル'],       desc:'光の向きから影の形を当てろ',                    time:'3分', added:'2026-07-21' },
  { slug:'kukan-test',  name:'空間認識偏差値テスト',     emoji:'🧠', tags:['空間','診断'],         desc:'頭の中で3Dを回せるか',                          time:'3分', added:'2026-07-20' },
  { slug:'answer-shoot',name:'アンサーシュート',         emoji:'🎯', tags:['クイズ','アクション'], desc:'答えがわかっても届けなきゃ正解じゃない',        time:'5分', added:'2026-07-21' },
  { slug:'yomiate',     name:'ヨミアテ',                 emoji:'🔢', tags:['推理','数字'],         desc:'情報を「買う」数字当て',                        time:'5分', added:'2026-07-21' },
  { slug:'untetris',    name:'つみおろし',               emoji:'🧩', tags:['推理','パズル'],       desc:'逆向きテトリス、積んだ順を暴け',                time:'4分', added:'2026-07-21' },
  { slug:'monty',       name:'モンティホール100連',      emoji:'🚪', tags:['確率','体感'],         desc:'「変える」となぜ2倍勝てるのか',                 time:'3分', added:'2026-07-21' },
  { slug:'toru-card',   name:'そのカード、取る？',       emoji:'🃏', tags:['確率','シミュ'],       desc:'デッキ構築の直感を1万回シミュで検算',          time:'4分', added:'2026-07-21' },
  { slug:'gacha-sim',   name:'1万人ガチャシミュレータ',  emoji:'🎰', tags:['確率','体感'],         desc:'「平均90連」の裏の地獄と天国',                  time:'3分', added:'2026-07-18' },
  { slug:'yomikiri',    name:'ヨミキリ',                 emoji:'✂️', tags:['AI対戦'],              desc:'あなたの癖を学習する限定ジャンケン',            time:'5分', added:'2026-07-19' },
  { slug:'damashi-ai',  name:'AIを騙せ！',               emoji:'🤖', tags:['AI対戦'],              desc:'騙すとその場で学習して強くなる',                time:'5分', added:'2026-07-19' },
];
const BASE = 'https://d-studylab.github.io/';

// ---- FNV-1a daily seed (既存ゲームと同一方式) ----
function dailySeed(dateStr) {
  let h = 2166136261;
  for (const ch of dateStr) { h ^= ch.charCodeAt(0); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function todayStr() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
// NEW = 追加日が新しい順の上位3本 かつ 7日以内（全部NEWになる初日問題と、
// 休業明けに古い作品へNEWが復活する問題の両方を防ぐ — サブ垢レビュー判断 2026-07-21）
const NEW_SLUGS = new Set(
  // ties must return 0 so the stable sort preserves GAMES order (newest-first by convention)
  GAMES.slice().sort((a, b) => a.added < b.added ? 1 : a.added > b.added ? -1 : 0)
    .slice(0, 3).map(g => g.slug));
function isNew(g) {
  const ms = Date.now() - new Date(g.added + 'T00:00:00').getTime();
  return NEW_SLUGS.has(g.slug) && ms >= 0 && ms < 7 * 86400000;
}

// ---- タグ集合（出現順を保つ） ----
const TAGS = [];
for (const g of GAMES) for (const t of g.tags) if (!TAGS.includes(t)) TAGS.push(t);

let activeTag = 'すべて';

function render() {
  const grid = document.getElementById('grid');
  const sorted = GAMES.slice().sort((a, b) => a.added < b.added ? 1 : a.added > b.added ? -1 : 0);
  const list = sorted.filter(g => activeTag === 'すべて' || g.tags.includes(activeTag));
  grid.innerHTML = list.length ? list.map(g => `
    <a class="card" href="${BASE}${g.slug}/" target="_blank" rel="noopener">
      ${isNew(g) ? '<span class="new">NEW</span>' : ''}
      <div class="emj">${g.emoji}</div>
      <div class="nm">${g.name}</div>
      <div class="ds">${g.desc}</div>
      <div class="meta">${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}<span class="time">${g.time}</span></div>
    </a>`).join('') : '<div class="empty">このタグのゲームはまだありません</div>';
}

function renderFilters() {
  const el = document.getElementById('filters');
  const chips = ['すべて', ...TAGS];
  el.innerHTML = chips.map(t => `<span class="chip${t === activeTag ? ' on' : ''}" data-tag="${t}">${t}</span>`).join('');
  el.querySelectorAll('.chip').forEach(c => c.onclick = () => { activeTag = c.dataset.tag; renderFilters(); render(); });
}

function renderToday() {
  const pick = GAMES[dailySeed(todayStr()) % GAMES.length];
  const el = document.getElementById('today');
  el.href = `${BASE}${pick.slug}/`;
  el.innerHTML = `<div class="emj">${pick.emoji}</div>
    <div><div class="lbl">きょうの1本</div>
    <div class="nm">${pick.name}</div>
    <div class="ds">${pick.desc}・${pick.time}</div></div>`;
}

renderToday();
renderFilters();
render();
</script>
</body>
</html>
